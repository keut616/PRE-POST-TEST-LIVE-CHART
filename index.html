        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try {

        if (!firebaseConfig && customFirebaseConfig && customFirebaseConfig.apiKey !== "YOUR_API_KEY") {

                if (!firebase.apps.length) {

                }

            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          ),
          FileText: ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          ),
          Lock: ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
          ),
          Unlock: ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" /></svg>
          ),
          Maximize: ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4M4 20l5-5m11 5h-4m4 0v-4m0 4l-5-5" /></svg>
          ),
          Minimize: ({ className = "w-5 h-5" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 14h6m0 0v6m0-6l-5 5m15-5h-6m0 0v6m0-6l5 5M4 10h6m0 0V4m0 6l-5-5m15 5h-6m0 0V4m0 6l5-5" /></svg>
          )
        };

        const surveyStructure = [
          {
            id: 'general_information',
            title: 'I. ຂໍ້ມູນທົ່ວໄປ',
            icon: <Icon.User />,
            questions: [
              { name: 'assessment_time', type: 'select_one', label: 'ການປະເມີນ', choices: 'assessment_time', required: true },
              { name: '_101', type: 'text', label: '101. ລະຫັດການປະເມີນ', required: true },
              { name: '_102', type: 'date', label: '102. ວັນທີ', required: true },
              { name: '_103', type: 'select_one', label: '103. ແຂວງ', choices: 'province', required: true },
              { name: '_104', type: 'select_one', label: '104. ເມືອງ', choices: 'district', required: true, choice_filter: (data) => data._103 },
              { name: '_105', type: 'text', label: '105. ບ່ອນເຮັດວຽກ', required: true }
            ]
          },
          {
            id: 'focus',
            title: 'II. ການສຸມໃສ່',
            icon: <Icon.Target />,
            questions: [
              { name: 'focus1', type: 'select_one', label: '1. ເຈົ້າຄວນໃຊ້ເວລາສ່ວນໃຫ່ຍ ໃນການເຮັດວຽກທີ່:', choices: 'focus1_opts', required: true },
              { name: 'focus2', type: 'select_one', label: '2. ສັດສ່ວນເວລາຂອງທ່ານທີ່ຄວນໃຊ້ໃນວຽກທີ່ “ສຳຄັນ ແລະ ບໍ່ຮີບດ່ວນ” ແມ່ນເທົ່າໃດ?', choices: 'focus2_opts', required: true },
              { name: 'focus3', type: 'select_one', label: '3. ທັກສະ “ການສຸມໃສ່” ໃຊ້ສໍາຫຼັບຫຍັງ?', choices: 'focus3_opts', required: true }
            ]
          },
          {
            id: 'align',
            title: 'III. ການຈັດວາງ - ຂັບເຄື່ອນ',
            icon: <Icon.Users />,
            questions: [
              { name: 'align1', type: 'select_one', label: '1. “ສະພາບແວດລ້ອມການເຮັດວຽກ” ແມ່ນຫຍັງ?', choices: 'aligna', required: true },
              { name: 'align2', type: 'select_one', label: '2. ເຮົາເອີ້ນສະມາຊິກໃນທີມຜູ້ທີ່ມັກເບິ່ງກິດຈະກຳ ແລະ ຕ້ອງໄດ້ປຸກລະດົມໃນການມີສ່ວນຮ່ວມ?', choices: 'alignb', required: true },
              { name: 'align3', type: 'select_one', label: '3. ລຸ່ມນີ້ມີອັນໃດແດ່ທີ່ເປັນທັກສະການອໍານວຍຄວາມສະດວກທີ່ດີ?', choices: 'alignc', required: true }
            ]
          },
          {
            id: 'inspire',
            title: 'IV. ການສ້າງແຮງບັນດານໃຈ',
            icon: <Icon.Lightbulb />,
            questions: [
              { name: 'inspire1', type: 'select_one', label: '1. ການປະຕິບັດກ່ຽວກັບການບໍລິຫານທີ່ສໍາຄັນອັນໃດ ທີ່ຈະເພີ່ມຄວາມໄວ້ວາງໃຈ?', choices: 'inspirea', required: true },
              { name: 'inspire2', type: 'select_one', label: '2. ການສ້າງຄວາມໄວ້ວາງໃຈແມ່ນສໍາຄັນ ສໍາຫຼັບ?', choices: 'inspireb', required: true },
              { name: 'inspire3', type: 'select_one', label: '3. ເտັກນິກການສື່ສານທີ່ດີແມ່ນຫຍັງ?', choices: 'inspirec', required: true }
            ]
          },
          {
            id: 'governance',
            title: 'V. ການຄຸ້ມຄອງ – ຄວາມຮັບຜິດຊອບ',
            icon: <Icon.ShieldCheck />,
            questions: [
              { name: 'gov1', type: 'select_one', label: '1. ອັນໃດເປັນວິທີການເກັບກຳຄໍາຄິດເຫັນຈາກລູກຄ້າ?', choices: 'gov1', required: true }
            ]
          }
        ];

        // ==========================================
        // MAIN APPLICATION COMPONENT
        // ==========================================
        function App() {
          const [user, setUser] = useState(null);
          const [isAdmin, setIsAdmin] = useState(false); 
          const [isChartFullscreen, setIsChartFullscreen] = useState(false);
          
          const [showAdminLogin, setShowAdminLogin] = useState(false);
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [adminLoginError, setAdminLoginError] = useState('');

          const [showNewFormModal, setShowNewFormModal] = useState(false);
          const [newFormText, setNewFormText] = useState('');
          const [newFormCopied, setNewFormCopied] = useState(false);
          
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          
          const [formData, setFormData] = useState({});
          const [errors, setErrors] = useState({});
          const [submitErrorMsg, setSubmitErrorMsg] = useState(''); 
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [showResultForm, setShowResultForm] = useState(false); 
          const [recentScore, setRecentScore] = useState(null);
          
          const [editId, setEditId] = useState(null);
          const [submissions, setSubmissions] = useState([]);
          const [chartFilter, setChartFilter] = useState('all'); 
          const [selectedSubmission, setSelectedSubmission] = useState(null);

          const maxTotalScore = Object.keys(correctAnswers).length;

          useEffect(() => {
            const initAuth = async () => {
              if (!auth) {
                setUser({ uid: 'demo-user', isAnonymous: true });
                return;
              }
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                  await auth.signInAnonymously();
                }
              } catch (error) {
                console.error("Auth error:", error);
              }
            };
            initAuth();
            
            if (auth) {
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }
          }, []);

          useEffect(() => {
            if (!user || !isAdmin) return;
            
            if (!db) {
              if (submissions.length === 0) {
                setSubmissions([
                  { id: 'demo-1', _101: 'LMG-001', _102: '2026-06-26', _103: '13', _104: '1314', _105: 'ພະແນກສາທາ', assessment_time: 'pre', score: 4, maxScore: 10, timestamp: { toMillis: () => Date.now() - 3600000 } },
                  { id: 'demo-2', _101: 'LMG-001', _102: '2026-06-26', _103: '13', _104: '1314', _105: 'ພະແນກສາທາ', assessment_time: 'post', score: 8, maxScore: 10, timestamp: { toMillis: () => Date.now() } }
                ]);
              }
              return;
            }

            const submissionsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments');

            const unsubscribe = submissionsRef.onSnapshot((snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                data.sort((a, b) => {
                  if (!a.timestamp) return 1;
                  if (!b.timestamp) return -1;
                  const timeA = typeof a.timestamp.toMillis === 'function' ? a.timestamp.toMillis() : (a.timestamp.seconds * 1000 || 0);
                  const timeB = typeof b.timestamp.toMillis === 'function' ? b.timestamp.toMillis() : (b.timestamp.seconds * 1000 || 0);
                  return timeA - timeB; 
                });
                setSubmissions(data);
              },
              (error) => console.error("Error fetching: ", error)
            );
            return () => unsubscribe();
          }, [user, isAdmin]);

          const handleAdminToggleClick = () => {
            if (isAdmin) {
              setIsAdmin(false); 
              setIsChartFullscreen(false);
              cancelEdit(); 
            } else {
              setAdminPasswordInput('');
              setAdminLoginError('');
              setShowAdminLogin(true); 
            }
          };

          const handleAdminSubmit = () => {
            if (adminPasswordInput === 'admin') {
              setIsAdmin(true);
              setShowAdminLogin(false);
            } else {
              setAdminLoginError('ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ! (Incorrect Password)');
            }
          };

          const handleGenerateNewForm = () => {
            const promptText = `ຊ່ວຍສ້າງແອັບປະເມີນຜົນໃໝ່ໃຫ້ຂ້ອຍແດ່ ໂດຍໃຊ້ໂຄງສ້າງ ແລະ UI ແບບດຽວກັນກັບແອັບປັດຈຸບັນ (ມີ 2 ໜ້າຈໍ ຊ້າຍ-ວາ, ມີລະບົບ Admin, ມີກຣາຟ Real-time), ແຕ່ປ່ຽນຂໍ້ມູນແບບສອບຖາມໃໝ່ຕາມນີ້:\n\n${newFormText}`;

            const textArea = document.createElement("textarea");
            textArea.value = promptText;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setNewFormCopied(true);
              setTimeout(() => {
                setNewFormCopied(false);
                setShowNewFormModal(false);
                setNewFormText('');
              }, 15000); 
            } catch (err) {
              console.error('Copy failed', err);
              alert("ຂໍອະໄພ, ການກັອບປີ້ລົ້ມເຫຼວ. ກະລຸນາກະລຸນາກັອບປີ້ດ້ວຍຕົນເອງແລ້ວນຳໄປວາງໃນຊ່ອງແຊັດ.");
            }
            document.body.removeChild(textArea);
          };

          const handleEditClick = (sub) => {
            setFormData(sub); 
            setEditId(sub.id); 
            setShowResultForm(false);
            setIsChartFullscreen(false);
            document.getElementById('left-pane').scrollTo({ top: 0, behavior: 'smooth' });
          };

          const cancelEdit = () => {
            setEditId(null);
            startNewEntry();
          };

          const requestDelete = (id) => {
            setDeleteConfirmId(id);
          };

          const confirmDelete = async () => {
            if (!deleteConfirmId) return;
            if (!db) {
              setSubmissions(prev => prev.filter(s => s.id !== deleteConfirmId));
              setDeleteConfirmId(null);
              return;
            }
            try {
              await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments').doc(deleteConfirmId).delete();
              setDeleteConfirmId(null);
            } catch (error) {
              console.error("Error deleting: ", error);
              setSubmitErrorMsg("ບໍ່ສາມາດລຶບຂໍ້ມູນໄດ້ (Cannot delete).");
              setDeleteConfirmId(null);
            }
          };

          const handleChange = (name, value) => {
            setFormData(prev => ({ ...prev, [name]: value }));
            if (errors[name]) {
              setErrors(prev => {
                const newErrors = { ...prev };
                delete newErrors[name];
                return newErrors;
              });
            }
            if (name === '_103') setFormData(prev => ({ ...prev, _104: '' }));
          };

          const validateForm = () => {
            const newErrors = {};
            let isValid = true;
            let firstErrorElement = null;

            surveyStructure.forEach(section => {
              section.questions.forEach(q => {
                if (q.required && !formData[q.name]) {
                  newErrors[q.name] = 'ກະລຸນາຕອບ (Required)';
                  isValid = false;
                  if (!firstErrorElement) firstErrorElement = `question-${q.name}`;
                }
              });
            });

            setErrors(newErrors);
            if (firstErrorElement) {
              const element = document.getElementById(firstErrorElement);
              if (element) element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            return isValid;
          };

          const calculateScore = () => {
            let currentScore = 0;
            Object.keys(correctAnswers).forEach(key => {
              if (formData[key] === correctAnswers[key]) currentScore += 1;
            });
            return currentScore;
          };

          const handleSubmit = async () => {
            if (!validateForm() || !user) return;
            setIsSubmitting(true);
            setSubmitErrorMsg(''); 
            
            const finalScore = calculateScore();
            setRecentScore({ total: finalScore, max: maxTotalScore });

            const dataToSave = {
              ...formData,
              score: finalScore,
              maxScore: maxTotalScore,
              percentage: Math.round((finalScore / maxTotalScore) * 100),
              timestamp: editId ? formData.timestamp : (db ? firebase.firestore.FieldValue.serverTimestamp() : { toMillis: () => Date.now(), seconds: Date.now() / 1000 }),
              updatedAt: editId ? (db ? firebase.firestore.FieldValue.serverTimestamp() : { toMillis: () => Date.now() }) : null, 
              userId: formData.userId || user.uid 
            };

            if (!db) {
              if (editId) {
                setSubmissions(prev => prev.map(s => s.id === editId ? { ...dataToSave, id: editId } : s));
              } else {
                const newDoc = { ...dataToSave, id: 'local-' + Math.random().toString(36).substr(2, 9) };
                setSubmissions(prev => [...prev, newDoc]);
              }
              setShowResultForm(true);
              setIsSubmitting(false);
              if (isAdmin) {
                document.getElementById('left-pane').scrollTo({ top: 0, behavior: 'smooth' });
              } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
              }
              return;
            }

            try {
              if (editId) {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments').doc(editId).update(dataToSave);
              } else {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assessments').add(dataToSave);
              }
              
              setShowResultForm(true);
              if (isAdmin) {
                document.getElementById('left-pane').scrollTo({ top: 0, behavior: 'smooth' });
              } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
              }
            } catch (error) {
              console.error("Error saving document: ", error);
              setSubmitErrorMsg("ຂໍອະໄພ, ບໍ່ສາມາດບັນທຶກຂໍ້ມູນໄດ້ໃນເວລານີ້. ກະລຸນາລອງໃໝ່ອີກຄັ້ງ.");
            } finally {
              setIsSubmitting(false);
            }
          };

          const startNewEntry = () => {
            setFormData({});
            setErrors({});
            setEditId(null);
            setShowResultForm(false);
            setSubmitErrorMsg('');
            if (isAdmin) {
              document.getElementById('left-pane').scrollTo({ top: 0, behavior: 'smooth' });
            } else {
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          const getChoiceLabel = (listName, nameValue) => {
            if (!nameValue) return '-';
            const list = choices[listName];
            if (!list) return nameValue;
            const item = list.find(c => c.name === nameValue);
            return item ? item.label : nameValue;
          };

          const filteredChartData = submissions.filter(s => {
            if (chartFilter === 'all') return true;
            return s.assessment_time === chartFilter;
          });

          const groupedSubmissions = Object.values(submissions.reduce((acc, sub) => {
            const code = sub._101;
            if (!code) return acc;
            if (!acc[code]) {
              acc[code] = { code, district: sub._104, workplace: sub._105, pre: null, post: null, latestTime: 0 };
            }
            if (sub.assessment_time === 'pre') acc[code].pre = sub;
            if (sub.assessment_time === 'post') acc[code].post = sub;
            
            acc[code].district = sub._104 || acc[code].district;
            acc[code].workplace = sub._105 || acc[code].workplace;
            
            let time = 0;
            if (sub.timestamp && typeof sub.timestamp.toMillis === 'function') {
                time = sub.timestamp.toMillis();
            } else if (sub.timestamp && sub.timestamp.seconds) {
                time = sub.timestamp.seconds * 1000;
            } else if (typeof sub.timestamp === 'number') {
                time = sub.timestamp;
            }
            if (time > acc[code].latestTime) acc[code].latestTime = time;
            
            return acc;
          }, {})).sort((a, b) => b.latestTime - a.latestTime);

          return (
            <React.Fragment>

              {!db && (
                <div className="bg-yellow-500 text-white text-center py-2 px-4 text-sm font-bold shadow-md print:hidden flex items-center justify-center gap-2 font-noto">
                  <Icon.AlertCircle className="w-5 h-5 text-white" />
                  <span>ໂໝດທົດລອງລະດັບທ້ອງຖິ່ນ (Local Demo Mode) — ຂໍ້ມູນຈະຖືກເກັບຊົ່ວຄາວໃນບຣາວເຊີເທົ່ານັ້ນ</span>
                </div>
              )}

              {showAdminLogin && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative">
                    <button onClick={() => setShowAdminLogin(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-full p-1 transition-colors">
                      <Icon.X className="w-5 h-5" />
                    </button>
                    <div className="flex justify-center mb-4 mt-2">
                      <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">
                        <Icon.Lock className="w-7 h-7 text-blue-600" />
                      </div>
                    </div>
                    <h3 className="text-xl font-bold text-center text-gray-800 mb-1">ເຂົ້າສູ່ລະບົບຜູ້ບໍລິຫານ</h3>
                    <p className="text-center text-gray-500 text-sm mb-6">Admin Dashboard Login</p>
                    
                    <input type="password" placeholder="ປ້ອນລະຫັດຜ່ານ (ລະຫັດ: admin)" value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminSubmit()} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4 text-center font-sans" autoFocus />
                    
                    {adminLoginError && (
                      <div className="mb-4 text-sm text-red-600 bg-red-50 p-2 rounded text-center flex justify-center items-center">
                        <Icon.AlertCircle className="w-4 h-4 mr-1 text-red-500" />{adminLoginError}
                      </div>
                    )}
                    <button onClick={handleAdminSubmit} className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-sm">
                      ຢືນຢັນ (Login)
                    </button>
                  </div>
                </div>
              )}

                    </h2>
                    <p className="text-gray-600 text-sm md:text-base mb-4 leading-relaxed">

                      ພຽງແຕ່ <strong className="text-blue-600">ວາງ (Paste)</strong> ຂໍ້ມູນຄຳຖາມ, ຕົວເລືອກ ແລະ ສະເຫຼີຍຄຳຕອບ ຈາກ Word ຫຼື Excel ລົງໃນກ່ອງນີ້ ແລ້ວກົດປຸ່ມສົ່ງດ້ານລຸ່ມ.

                      value={newFormText}

                    ></textarea>

                          ...ຂໍ້ມູນໄດ້ຖືກກັອບປີ້ໄວ້ແລ້ວ. ກະລຸນາຄລິກໃສ່ <strong>ຊ່ອງແຊັດ (Chat) ດ້ານຊ້າຍມື</strong> <br/>

              {deleteConfirmId && (

                     <div className="flex justify-center mb-4 mt-2">
                      <div className="w-14 h-14 bg-red-100 text-red-600 rounded-full flex items-center justify-center">

                    <p className="text-gray-500 text-sm mb-6">#<b>ຂໍ້ມູນທີ່ຖືກລຶບແລ້ວຈະບໍ່ສາມາດກູ້ຄືນໄດ້.</b> ທ່ານແນ່ໃຈບໍ່ວ່າຕ້ອງການລຶບ?</p>

                                    {q.type === 'select_one' && (
                                      <div className="space-y-2">
                                        {choices[q.choices].filter(c => q.choice_filter ? c.cf === q.choice_filter(formData) : true).map((choice, i) => (
                                          <label key={i} className={`flex items-start p-2.5 border rounded-lg cursor-pointer ${formData[q.name] === choice.name ? 'bg-blue-50 border-blue-400' : 'border-gray-200 hover:bg-gray-50'}`}>
                                            <input type="radio" name={q.name} value={choice.name} checked={formData[q.name] === choice.name} onChange={(e) => handleChange(q.name, e.target.value)} className="mt-0.5 w-4 h-4 text-blue-600 focus:ring-blue-500" disabled={isSubmitting} />
                                            <span className="ml-2.5 text-sm text-gray-700 font-noto">{choice.label}</span>
                                          </label>
                                        ))}
                                      </div>
                                    )}
                                    {errors[q.name] && <div className="text-red-600 text-xs mt-1.5 flex items-center gap-1"><Icon.AlertCircle className="w-4 h-4 text-red-500" />{errors[q.name]}</div>}
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>

                              <Icon.AlertCircle className="w-5 h-5 mr-2 text-red-700" />
                              {submitErrorMsg}
                            </div>
                          )}

                          <button
                            onClick={handleSubmit}
                            disabled={isSubmitting || !user}
                            className={`w-full py-3.5 text-white font-bold rounded-xl shadow flex justify-center items-center gap-2 ${isSubmitting || !user ? 'bg-gray-400 cursor-not-allowed' : (editId ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-blue-600 hover:bg-blue-700')} active:scale-[0.98] transition-transform`}
                          >
                            {isSubmitting ? 'ກຳລັງບັນທຶກ...' : (
                              editId ? <React.Fragment><Icon.Edit className="w-5 h-5 text-white" /> ອັບເດດຂໍ້ມູນ (Update Data)</React.Fragment> : <React.Fragment><Icon.CheckCircle className="w-5 h-5 text-white" /> ສົ່ງຂໍ້ມູນ (Submit & Save)</React.Fragment>

                          <Icon.CheckCircle className="w-10 h-10 text-green-500" />
                        </div>

                          {editId ? 'ອັບເດດສຳເລັດ!' : 'ບັນທຶກສຳເລັດ!'}

                        <p className="text-gray-500 mb-6">ລະຫັດ: <span className="font-bold text-gray-800">{formData._101}</span> ຖືກ {editId ? 'ອັບເດດລົງ' : 'ບັນທຶກລົງ'}ຖານຂໍ້ມູນແລ້ວ.</p>
                        
                        <div className="bg-blue-50 border border-blue-100 rounded-xl p-6 mb-8 inline-block w-full max-w-xs">
                          <p className="text-sm text-blue-800 font-semibold mb-2">ຄະແນນທີ່ໄດ້ (Score)</p>
                          <div className="text-5xl font-bold text-blue-600 font-sans">{recentScore?.total}<span className="text-2xl text-blue-400">/{recentScore?.max}</span></div>
                        </div>

                        <button onClick={startNewEntry} className="w-full py-3.5 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl shadow flex justify-center items-center gap-2 transition-colors">
                          <Icon.Refresh className="w-5 h-5 text-white" /> ກັບຄືນ / ປ້ອນຂໍ້ມູນໃໝ່ (New Entry)
                        </button>
                      </div>
                    )}
                  </div>
                </div>


                {/* RIGHT PANE */}
                {isAdmin && (
                  <div className={`${isChartFullscreen ? 'w-full' : 'w-1/2'} h-full overflow-y-auto bg-white z-10 shadow-[-10px_0_15px_-5px_rgba(0,0,0,0.05)] transition-all duration-300 ease-in-out`}>
                    <div className={`p-4 sm:p-6 lg:p-8 ${isChartFullscreen ? 'max-w-7xl mx-auto' : 'min-w-[400px]'}`}>
                      
                      {!db && (
                        <div className="mb-6 p-5 bg-blue-50 border border-blue-200 rounded-2xl text-blue-800 text-xs md:text-sm animate-in fade-in slide-in-from-top-4 duration-300 font-noto">
                          <h4 className="font-bold text-blue-900 mb-2 flex items-center gap-1.5">
                            <Icon.AlertCircle className="w-5 h-5 text-blue-700" />
                            ວິທີເຊື່ອມຕໍ່ຖານຂໍ້ມູນຄລາວ (ຟຣີ 100%) ເພື່ອບັນທຶກຂໍ້ມູນຖາວອນເທິງ GitHub Pages:
                          </h4>
                          <ol className="list-decimal list-inside space-y-1 ml-1 leading-relaxed">
                            <li>ເຂົ້າໄປສ້າງໂຄງການໃນເວັບໄຊທ໌ <strong className="text-blue-900 font-sans">firebase.google.com</strong> (ຟຣີ Spark Plan).</li>
                            <li>ເພີ່ມ Web App ໃໝ່ໃນລະບົບ Firebase ເພື່ອເອົາລະຫັດຄອນຟິກ (<strong className="text-blue-900 font-sans">firebaseConfig</strong>).</li>
                            <li>ເປີດໄຟລ໌ <strong className="text-blue-900 font-sans">index.html</strong> ນີ້ດ້ວຍໂປຣແກຣມແກ້ໄຂໂຄ້ດ (ເຊັ່ນ VS Code ຫຼື Notepad).</li>
                            <li>ຊອກຫາຄຳວ່າ <strong className="text-blue-900 font-sans">customFirebaseConfig</strong> (ຢູ່ປະມານແຖວທີ 37) ແລ້ວເອົາຄອນຟິກ Firebase ຂອງທ່ານມາແທນທີ່.</li>
                            <li>ອັບໂຫລດໄຟລ໌ນີ້ຂຶ້ນ GitHub Pages ແລ້ວລະບົບຈະເລີ່ມເກັບຂໍ້ມູນຢ່າງຖາວອນທັນທີ!</li>
                          </ol>
                        </div>
                      )}

                      <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 gap-4">

                          <Icon.Database className="w-6 h-6 text-blue-600" />
                          <h2 className="text-xl font-bold text-gray-800">

                          </h2>
                          <button 
                            onClick={() => setIsChartFullscreen(!isChartFullscreen)}
                            className="ml-3 p-2 text-gray-500 hover:text-blue-600 bg-gray-100 hover:bg-blue-50 rounded-lg transition-colors"
                            title={isChartFullscreen ? "ຫຍໍ້ໜ້າຈໍ" : "ຂະຫຍາຍເຕັມຈໍ"}
                          >
                            {isChartFullscreen ? <Icon.Minimize /> : <Icon.Maximize />}
                          </button>

                        <div className="flex flex-wrap items-center gap-3">

                          >
                            <Icon.FileText className="w-4 h-4 text-blue-700" /> ກອບປີ້ ແລະ ວາງແບບຟອມໃໝ່
                          </button>

                            <button onClick={() => setChartFilter('pre')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${chartFilter==='pre' ? 'text-white shadow' : 'text-gray-500 hover:text-gray-700'}`} style={chartFilter==='pre' ? {backgroundColor: '#35675D'} : {}}>Pre-test</button>
                            <button onClick={() => setChartFilter('post')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${chartFilter==='post' ? 'text-white shadow' : 'text-gray-500 hover:text-gray-700'}`} style={chartFilter==='post' ? {backgroundColor: '#BF5A38'} : {}}>Post-test</button>
                          </div>
                        </div>
                      </div>

                      <div className={`grid gap-4 mb-8 ${isChartFullscreen ? 'grid-cols-4' : 'grid-cols-2'}`}>

                          <p className="text-sm font-semibold" style={{ color: '#35675D' }}>ຈຳນວນ Pre-test</p>
                          <p className="text-2xl font-bold font-sans" style={{ color: '#35675D' }}>{submissions.filter(s => s.assessment_time === 'pre').length}</p>
                        </div>
                        <div className="p-4 rounded-xl shadow-sm border" style={{ backgroundColor: 'rgba(191, 90, 56, 0.1)', borderColor: 'rgba(191, 90, 56, 0.2)' }}>

                          <p className="text-2xl font-bold font-sans" style={{ color: '#BF5A38' }}>{submissions.filter(s => s.assessment_time === 'post').length}</p>
                        </div>
                      </div>

                      <div className="bg-white border border-gray-200 rounded-2xl shadow-sm p-4 mb-8">
                        <h3 className="text-sm font-bold text-gray-700 mb-4 ml-2">ຄະແນນລວມ (Total Scores)</h3>
                        <ColumnChart data={filteredChartData} maxScore={maxTotalScore} isFullscreen={isChartFullscreen} />
                        <div className="flex justify-center gap-6 mt-6">
                          <div className="flex items-center text-xs text-gray-600"><span className="w-3 h-3 rounded-sm mr-2" style={{ backgroundColor: '#35675D' }}></span> Pre-test</div>
                          <div className="flex items-center text-xs text-gray-600"><span className="w-3 h-3 rounded-sm mr-2" style={{ backgroundColor: '#BF5A38' }}></span> Post-test</div>
                        </div>
                      </div>

                      <div className="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden mb-8">
                        <div className="p-4 bg-gray-50 border-b border-gray-200 flex items-center gap-2">
                          <Icon.List />
                          <h3 className="text-sm font-bold text-gray-700">ລາຍການຂໍ້ມູນທັງໝົດ (All Records)</h3>
                        </div>
                        <div className="overflow-x-auto">
                          <table className="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                              <tr className="bg-white border-b">
                                <th className="p-3 font-semibold text-gray-500 text-xs whitespace-nowrap">ລະຫັດ (Code)</th>
                                <th className="p-3 font-semibold text-gray-500 text-xs whitespace-nowrap">ເມືອງ (District)</th>
                                <th className="p-3 font-semibold text-gray-500 text-xs whitespace-nowrap">ບ່ອນເຮັດວຽກ (Workplace)</th>
                                <th className="p-3 font-semibold text-gray-500 text-xs whitespace-nowrap text-center">ຄະແນນກ່ອນ</th>
                                <th className="p-3 font-semibold text-gray-500 text-xs whitespace-nowrap text-center">ຄະແນນຫຼັງ</th>
                                <th className="p-3 font-semibold text-gray-500 text-xs whitespace-nowrap text-right">ຈັດການ (Actions)</th>
                              </tr>
                            </thead>
                            <tbody>
                              {groupedSubmissions.length === 0 ? (
                                <tr>
                                  <td colSpan="6" className="p-8 text-center text-gray-400 text-sm">ຍັງບໍ່ມີຂໍ້ມູນ</td>
                                </tr>
                              ) : (
                                groupedSubmissions.map((group) => (
                                  <tr key={group.code} className="border-b last:border-b-0 hover:bg-gray-50/50 transition-colors bg-white">
                                    <td className="p-3 font-bold text-gray-800 font-sans text-sm">{group.code}</td>
                                    <td className="p-3 text-xs text-gray-600 truncate max-w-[120px]" title={getChoiceLabel('district', group.district)}>
                                      {getChoiceLabel('district', group.district)}
                                    </td>
                                    <td className="p-3 text-xs text-gray-600 truncate max-w-[120px]" title={group.workplace}>
                                      {group.workplace || '-'}
                                    </td>
                                    <td className="p-3 text-sm font-bold font-sans text-center">
                                      {group.pre ? (
                                        <span className="px-2 py-1 bg-[#35675D]/10 text-[#35675D] rounded cursor-help" title={`ວັນທີປະເມີນ: ${group.pre._102}`}>{group.pre.score}</span>
                                      ) : <span className="text-gray-300">-</span>}
                                    </td>
                                    <td className="p-3 text-sm font-bold font-sans text-center">
                                      {group.post ? (
                                        <span className="px-2 py-1 bg-[#BF5A38]/10 text-[#BF5A38] rounded cursor-help" title={`ວັນທີປະເມີນ: ${group.post._102}`}>{group.post.score}</span>
                                      ) : <span className="text-gray-300">-</span>}
                                    </td>
                                    <td className="p-3 text-right">
                                      <div className="flex flex-col items-end justify-center gap-1.5">
                                        {group.pre && (
                                          <div className="flex items-center gap-1">
                                            <span className="text-[9px] text-[#35675D] font-bold mr-1">PRE:</span>
                                            <button onClick={() => { setSelectedSubmission(group.pre); setIsChartFullscreen(false); }} className="p-1 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="ເບິ່ງລາຍລະອຽດ Pre-test"><Icon.Eye className="w-4 h-4" /></button>
                                            <button onClick={() => handleEditClick(group.pre)} className="p-1 text-yellow-600 hover:bg-yellow-50 rounded transition-colors" title="ແກ້ໄຂ Pre-test"><Icon.Edit className="w-4 h-4" /></button>
                                            <button onClick={() => requestDelete(group.pre.id)} className="p-1 text-red-500 hover:bg-red-50 rounded transition-colors" title="ລຶບ Pre-test"><Icon.Trash className="w-4 h-4 text-red-500" /></button>
                                          </div>
                                        )}
                                        {group.post && (
                                          <div className="flex items-center gap-1">
                                            <span className="text-[9px] text-[#BF5A38] font-bold mr-1">POST:</span>
                                            <button onClick={() => { setSelectedSubmission(group.post); setIsChartFullscreen(false); }} className="p-1 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="ເບິ່ງລາຍລະອຽດ Post-test"><Icon.Eye className="w-4 h-4" /></button>
                                            <button onClick={() => handleEditClick(group.post)} className="p-1 text-yellow-600 hover:bg-yellow-50 rounded transition-colors" title="ແກ້ໄຂ Post-test"><Icon.Edit className="w-4 h-4" /></button>
                                            <button onClick={() => requestDelete(group.post.id)} className="p-1 text-red-500 hover:bg-red-50 rounded transition-colors" title="ລຶບ Post-test"><Icon.Trash className="w-4 h-4 text-red-500" /></button>
                                          </div>
                                        )}
                                      </div>
                                    </td>
                                  </tr>
                                ))
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>

                    </div>
                  </div>
                )}

              </div>
              
              {/* Individual Result Modal */}
              {selectedSubmission && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] font-noto">
                  <div className="bg-white rounded-3xl w-full max-w-lg p-6 shadow-2xl relative">
                    <button onClick={() => setSelectedSubmission(null)} className="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors"><Icon.X /></button>
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon.User /> ຂໍ້ມູນລາຍບຸກຄົນ</h2>
                    <div className="space-y-3">
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ລະຫັດ:</span> <strong className="font-sans">{selectedSubmission._101}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ການປະເມີນ:</span> <strong>{selectedSubmission.assessment_time === 'pre' ? 'Pre-test' : 'Post-test'}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ເມືອງ:</span> <strong>{getChoiceLabel('district', selectedSubmission._104)}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ບ່ອນເຮັດວຽກ:</span> <strong>{selectedSubmission._105 || '-'}</strong></p>
                      <p className="flex justify-between border-b pb-2"><span className="text-gray-500">ວັນທີ:</span> <strong>{selectedSubmission._102}</strong></p>
                      <div className="bg-gray-50 p-4 rounded-xl mt-4 text-center">
                        <span className="block text-gray-500 text-sm mb-1">ຄະແນນລວມ</span>
                        <strong className="text-4xl font-sans text-blue-600">{selectedSubmission.score}<span className="text-xl text-gray-400">/{selectedSubmission.maxScore}</span></strong>
                      </div>
                    </div>
                    <button onClick={() => { handleEditClick(selectedSubmission); setSelectedSubmission(null); }} className="w-full mt-4 py-3 bg-yellow-500 text-white font-bold rounded-xl hover:bg-yellow-600 transition-colors flex justify-center items-center gap-2">
                      <Icon.Edit className="w-5 h-5 text-white" /> ແກ້ໄຂຂໍ້ມູນນີ້ (Edit)
                    </button>
                  </div>
                </div>
              )}
            </React.Fragment>
          );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
